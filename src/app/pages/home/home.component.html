@if(!topArticle) {
  <h4>Recherche des articles, un instant...</h4>
}

@if(topArticle) {
  <app-article-card [article]="topArticle" />
}


@if(articles) {
  <h3>Actualités</h3>
  <div class="body-article">
    @for (article of articles; track article) {
      <app-litle-article-card [article]="article" />
    }
  </div>
}
