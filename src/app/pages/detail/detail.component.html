@if(article) {
<h3>{{ article.title }}</h3>
<app-article-card [article]="article" />
} @else {
<p class="indice">{{ indiceMessage }}</p>
}

<div class="cs-wrap">
  <h3 class="cs-title">Commentaires</h3>

  <app-comment />

  <button type="button" class="btn-cancel" routerLink="/">
    Revenir à la page d'accueil
  </button>
</div>

@if (showToast) {
<app-toast [message]="message" (closed)="showToast = false" />
}
