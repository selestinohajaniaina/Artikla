<div class="card">
  <div class="image-wrapper">
    <div class="category-pill">{{ article.category }}</div>
    <img [src]="article.imgUrl" [alt]="article.title" />
  </div>
  <div class="article-body">
    <div class="article-header">
      <div>
        <h3>{{ article.title }}</h3>
        <span class="author">Par {{ article.author || 'Unknown author' }}</span>
      </div>
      @if (!loading) {
        <button class="badge" (click)="likeArticle(article)">
          J'aime
        </button>
      } @else {
        <button class="badge"> ... </button>
      }
    </div>

    <p class="article-excerpt">{{ article.content }}</p>

    <div class="meta-row">
      <span class="meta-item">
        <strong>{{ createdAtFormatted }}</strong>
        <small>Publié</small>
      </span>
      <span class="meta-item">
        <strong>{{ article.likes || 0 }}</strong>
        <small>J'aime</small>
      </span>
      <span class="meta-item">
        <strong>{{ article.visited || 0 }}</strong>
        <small>Visites</small>
      </span>
    </div>
  </div>
</div>

@if (showToast) {
  <app-toast [message]="message" (closed)="showToast = false"/>
}
